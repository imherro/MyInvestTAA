<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MyInvestTAA 网站地图</title>
  <style>
    :root { color-scheme:light; --bg:#f5f7f8; --panel:#fff; --ink:#17202a; --muted:#5b6874; --line:#d8dee3; --blue:#175ea8; --red:#a32929; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:Arial,"Microsoft YaHei",sans-serif; line-height:1.6; }
    header,main,footer { width:min(1180px,calc(100% - 32px)); margin:0 auto; }
    header { padding:26px 0 14px; }
    h1 { margin:0; font-size:32px; letter-spacing:0; }
    h2 { margin:0 0 6px; font-size:22px; letter-spacing:0; }
    p { margin:6px 0; }
    .subtle { color:var(--muted); }
    .primary-nav { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:1px; margin:18px 0; border:1px solid var(--line); background:var(--line); }
    .primary-nav a { background:#fff; color:var(--ink); text-decoration:none; padding:12px; font-weight:700; }
    .primary-nav a span { display:block; color:var(--muted); font-size:12px; font-weight:400; }
    main { display:grid; gap:14px; padding-bottom:30px; }
    section { padding:20px; background:var(--panel); border:1px solid var(--line); border-radius:6px; }
    .route-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-top:14px; }
    .route-link { display:block; min-width:0; padding:13px; border:1px solid var(--line); color:var(--ink); text-decoration:none; }
    .route-link strong { display:block; color:var(--blue); }
    .route-link span { display:block; color:var(--muted); font-size:13px; }
    section[data-level="archived"] { border-left:5px solid var(--red); }
    footer { color:var(--muted); border-top:1px solid var(--line); padding:18px 0 28px; }
    @media (max-width:900px) { .primary-nav,.route-grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:560px) { header,main,footer { width:min(100% - 20px,1180px); } h1 { font-size:26px; } .primary-nav,.route-grid { grid-template-columns:1fr; } section { padding:15px; } }
  </style>
</head>
<body>
  <header>
    <h1>网站地图</h1>
    <p class="subtle">只列出当前仍有使用价值的页面。冻结实验和早期研发路由不再进入用户导航。</p>
    {{ primary_navigation|safe }}
  </header>
  <main>
    {% for group in groups %}
    <section data-level="{{ group.level }}">
      <h2>{{ group.title }}</h2>
      <p class="subtle">{{ group.description }}</p>
      <div class="route-grid">
        {% for route, label, description in group.routes %}
        <a class="route-link" href="{{ route }}"><strong>{{ label }}</strong><span>{{ route }}</span><span>{{ description }}</span></a>
        {% endfor %}
      </div>
    </section>
    {% endfor %}
  </main>
  <footer>页面层级与跳转总览 · 非交易指令</footer>
</body>
</html>
