<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>${title} | MyInvestTAA</title>
  <style>
    :root{--ink:#17201d;--muted:#61706a;--line:#dce3df;--paper:#fff;--wash:#f4f7f5;--green:#147d64;--green-soft:#e7f3ee;--orange:#c2532d;--danger:#a33c35;--max:1180px;color-scheme:light}
    *{box-sizing:border-box}body{margin:0;background:var(--wash);color:var(--ink);font:15px/1.6 system-ui,-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;letter-spacing:0}a{color:inherit}code{font:13px ui-monospace,Consolas,monospace;background:#edf1ef;padding:2px 5px;border-radius:3px}
    .shell{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line)}.shell-inner{max-width:var(--max);margin:auto;min-height:64px;padding:0 24px;display:flex;align-items:center;gap:30px}.brand{text-decoration:none;font-weight:800;font-size:18px}.brand span{color:var(--green)}nav{display:flex;gap:6px;flex-wrap:wrap}nav a{padding:8px 10px;text-decoration:none;color:#3e4c47;border-bottom:2px solid transparent}nav a:hover,nav a:focus{color:var(--green);border-color:var(--green)}
    main{max-width:var(--max);margin:auto;padding:34px 24px 60px}.eyebrow{margin:0 0 4px;color:var(--green);font-size:13px;font-weight:800;text-transform:uppercase}.page-head{margin-bottom:26px}.page-head h1{margin:0;font-size:32px;line-height:1.2}.page-head p{max-width:760px;margin:10px 0 0;color:var(--muted)}
    section{margin:28px 0}.section-head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:10px}.section-head h2{font-size:20px;margin:0}.section-head p{margin:0;color:var(--muted)}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));border:1px solid var(--line);background:var(--paper)}.metric{min-height:118px;padding:20px;border-right:1px solid var(--line);display:flex;flex-direction:column}.metric:last-child{border:0}.metric-label{color:var(--muted);font-size:13px}.metric strong{font-size:24px;margin-top:5px}.metric small,td small{display:block;color:var(--muted)}
    .panel{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:20px}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:18px}.split>*{min-width:0}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.button{display:inline-flex;align-items:center;min-height:40px;padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:5px;text-decoration:none;font-weight:700}.button.primary{background:var(--green);border-color:var(--green);color:#fff}.button:hover{filter:brightness(.96)}
    .table-wrap{overflow:auto;border:1px solid var(--line);background:#fff}table{width:100%;border-collapse:collapse;min-width:640px}th,td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top}th{font-size:12px;color:var(--muted);background:#f8faf9}tr:last-child td{border-bottom:0}.weight-bar{display:inline-block;width:90px;height:7px;background:#e3e9e6;margin-right:9px;vertical-align:middle}.weight-bar i{display:block;height:100%;background:var(--green)}
    .notice{padding:12px 14px;border-left:4px solid var(--green);background:var(--green-soft)}.notice.danger{border-color:var(--danger);background:#f8eae8}.notice.info{border-color:#467d95;background:#eaf2f5}.plain-list{margin:0;padding-left:20px}.plain-list li{margin:5px 0}.plain-list .ok{color:var(--green)}
    .chart{position:relative;width:100%;height:360px;background:#fff;border:1px solid var(--line);padding:10px}.chart canvas{display:block;width:100%;height:100%}.chart-legend{position:absolute;z-index:2;top:10px;right:16px;display:flex;gap:14px;flex-wrap:wrap;justify-content:flex-end;padding:3px 6px;background:#ffffffdc;color:var(--muted);font-size:12px}.chart-legend span{display:flex;align-items:center;gap:6px}.chart-legend i{width:16px;height:3px}.chart-tooltip{position:absolute;pointer-events:none;z-index:3;min-width:185px;padding:8px 10px;background:#17201ded;color:#fff;font-size:12px;border-radius:4px;white-space:pre-line}.legend{color:var(--muted);font-size:13px}.unavailable{max-width:720px;padding-top:90px}.unavailable h1{font-size:34px;margin:0 0 22px}
    footer{border-top:1px solid var(--line);background:#fff;color:var(--muted)}footer div{max-width:var(--max);margin:auto;padding:22px 24px;display:flex;justify-content:space-between;gap:20px}
    @media(max-width:800px){.shell-inner{align-items:flex-start;flex-direction:column;gap:4px;padding-top:12px;padding-bottom:10px}nav{width:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0}nav a{white-space:nowrap;text-align:center;padding:6px 4px}.metrics{grid-template-columns:1fr 1fr}.metric:nth-child(2){border-right:0}.metric:nth-child(-n+2){border-bottom:1px solid var(--line)}.split{grid-template-columns:1fr}.page-head h1{font-size:24px;line-height:1.3}.section-head{align-items:flex-start;flex-direction:column}.chart{height:300px}}
    @media(max-width:480px){main{padding:26px 14px 48px}.shell-inner{padding-left:14px;padding-right:14px}.metrics{grid-template-columns:1fr}.metric{border-right:0;border-bottom:1px solid var(--line)!important;min-height:95px}.metric:last-child{border-bottom:0!important}.panel{padding:14px}.chart{height:260px}footer div{padding:18px 14px;flex-direction:column}}
  </style>
</head>
<body>
  <header class="shell"><div class="shell-inner"><a class="brand" href="/">MyInvest<span>TAA</span></a><nav aria-label="主导航"><a href="/">首页</a><a href="/allocation">当前配置</a><a href="/research">指数研究</a><a href="/shadow">ETF Shadow</a><a href="/data">数据状态</a><a href="/site-map">网站地图</a></nav></div></header>
  ${content}
  <footer><div><span>CURRENT_TAA · 数据截至 ${data_as_of}</span><span>研究与跟踪工具，不构成交易指令</span></div></footer>
  <script>
  (()=>{const pad={l:58,r:22,t:34,b:38};for(const root of document.querySelectorAll('.chart')){const canvas=root.querySelector('canvas'),tip=root.querySelector('.chart-tooltip'),series=JSON.parse(root.dataset.series||'[]');let scaled=[];function draw(hover=-1){const dpr=devicePixelRatio||1,w=root.clientWidth-20,h=root.clientHeight-20;canvas.width=w*dpr;canvas.height=h*dpr;const c=canvas.getContext('2d');c.scale(dpr,dpr);c.clearRect(0,0,w,h);const all=series.flatMap(s=>s.points||[]);if(!all.length)return;const vals=all.map(p=>Number(p.value)),lo=Math.min(...vals),hi=Math.max(...vals),span=hi-lo||.1,left=pad.l,right=w-pad.r,top=pad.t,bottom=h-pad.b;c.strokeStyle='#dce3df';c.fillStyle='#61706a';c.font='12px system-ui';for(let i=0;i<5;i++){const y=top+(bottom-top)*i/4,v=hi-span*i/4;c.beginPath();c.moveTo(left,y);c.lineTo(right,y);c.stroke();c.fillText(v.toFixed(2),5,y+4)}scaled=series.map(s=>{const pts=(s.points||[]).map((p,i,a)=>({x:left+(right-left)*(a.length===1?.5:i/(a.length-1)),y:bottom-(Number(p.value)-lo)/span*(bottom-top),...p}));c.strokeStyle=s.color;c.lineWidth=2;c.beginPath();pts.forEach((p,i)=>i?c.lineTo(p.x,p.y):c.moveTo(p.x,p.y));c.stroke();if(pts.length===1){c.fillStyle=s.color;c.beginPath();c.arc(pts[0].x,pts[0].y,5,0,Math.PI*2);c.fill()}return{...s,pts}});c.fillStyle='#61706a';const dates=all.map(p=>p.date);c.fillText(dates[0]||'',left,bottom+24);const last=dates.at(-1)||'',tw=c.measureText(last).width;c.fillText(last,right-tw,bottom+24);if(hover>=0&&scaled[0]?.pts[hover]){const x=scaled[0].pts[hover].x;c.strokeStyle='#17201d';c.setLineDash([4,4]);c.beginPath();c.moveTo(x,top);c.lineTo(x,bottom);c.stroke();c.setLineDash([]);for(const s of scaled){const p=s.pts[Math.min(hover,s.pts.length-1)];c.fillStyle=s.color;c.beginPath();c.arc(p.x,p.y,4,0,Math.PI*2);c.fill()}}}function move(e){if(!scaled[0]?.pts.length)return;const r=canvas.getBoundingClientRect(),x=e.clientX-r.left;let i=0,best=Infinity;scaled[0].pts.forEach((p,n)=>{const d=Math.abs(p.x-x);if(d<best){best=d;i=n}});draw(i);const lines=[scaled[0].pts[i].date,...scaled.map(s=>`${s.label}: ${Number(s.pts[Math.min(i,s.pts.length-1)].value).toFixed(4)}`)];tip.textContent=lines.join('\n');tip.hidden=false;tip.style.left=Math.min(root.clientWidth-215,Math.max(8,e.clientX-r.left+18))+'px';tip.style.top='42px'}canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseleave',()=>{tip.hidden=true;draw()});new ResizeObserver(()=>draw()).observe(root);draw()}})();
  </script>
  <script src="https://invest.okbbc.com/header.js" defer></script>
  <script src="https://invest.okbbc.com/footer.js" defer></script>
</body>
</html>
